<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统Q&A与操作手册</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="user-view">
        <div id="loginModal" class="login-modal-overlay" style="display:none;">
            <div class="login-modal">
                <div class="login-header">
                    <h2>用户登录</h2>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="login-form-group">
                        <label for="loginUsername">账号</label>
                        <input type="text" id="loginUsername" class="login-input" placeholder="请输入账号" autocomplete="off">
                    </div>
                    <div class="login-form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" class="login-input" placeholder="请输入密码">
                    </div>
                    <div id="loginError" class="login-error"></div>
                    <button type="submit" class="login-btn">登录</button>
                    <button type="button" class="login-cancel-btn" id="loginCancelBtn">取消</button>
                </form>
            </div>
        </div>
        <header class="header">
            <div class="header-title">
                <h1>系统Q&A与操作手册</h1>
            </div>
            <div class="header-right">
                <span id="userDisplayName" class="user-display-name">游客</span>
                <button id="loginBtn" class="btn btn-primary">登录</button>
                <button id="logoutBtn" class="btn btn-secondary" style="display:none;">退出登录</button>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar-left" id="directoryTree"></aside>

            <aside class="sidebar-right" id="contentArea">
                <div class="tab-container">
                    <div class="tab-header" id="tabHeader"></div>
                    <div class="tab-content" id="tabContent"></div>
                </div>
            </aside>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script src="data.js"></script>
    <script src="user.js"></script>
</body>
</html>
